name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint, typecheck, format, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run format:check

      - run: npm run build

  backend:
    name: Backend (cargo check, clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: cargo check --manifest-path src-tauri/Cargo.toml

      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
