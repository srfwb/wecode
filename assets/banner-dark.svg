<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="tile-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e3a15b"/>
      <stop offset="1" stop-color="#8a5e30"/>
    </linearGradient>
  </defs>

  <!-- Amber tile -->
  <rect x="172" y="30" width="60" height="60" rx="14" fill="url(#tile-grad)"/>

  <!-- W mark (62% of tile = 37.2px, centered in the 60px tile) -->
  <g transform="translate(183.4 41.4) scale(0.58125)"
     stroke="#0a0a0c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 18 L22 46 L32 24 L42 46 L50 18"/>
  </g>

  <!-- Wordmark text -->
  <text x="250" y="72"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="42" font-weight="500" letter-spacing="-0.022em"
        fill="#f5f2eb">WeCode</text>
</svg>
