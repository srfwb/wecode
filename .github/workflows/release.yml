name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: WeCode ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](CHANGELOG.md) for the list of changes.

            ## Install
            - **Windows**: download the `.msi` installer
            - **macOS**: download the `.dmg` and drag to Applications
            - **Linux**: download the `.AppImage` and `chmod +x` it, or install the `.deb`

            > Code signing is not configured yet, so the OS may show a security warning on first launch.
          releaseDraft: true
          prerelease: false
